<!DOCTYPE html>
<html>
<head>
    <title>Airtrade Kenya - Buy & Sell Airtime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 14px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #11998e;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 25px;
            padding: 18px;
            border-radius: 14px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            display: block;
        }
        .result.loading {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
            display: block;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .info-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .info-card .big {
            font-size: 28px;
            font-weight: bold;
            color: #11998e;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.9;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #11998e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Airtrade Kenya</h1>
            <p>Swap Airtime for Cash • Best Rates in Kenya</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('sell')">💰 Sell Airtime</button>
                <button class="tab" onclick="showTab('buy')">📱 Buy Airtime</button>
            </div>

            <!-- SELL FORM -->
            <div id="sellForm">
                <div class="form-group">
                    <label>📞 Your phone number (with airtime)</label>
                    <input type="tel" id="sellPhone" placeholder="0712345678">
                </div>
                <div class="form-group">
                    <label>💵 Airtime amount (KES)</label>
                    <input type="number" id="sellAmount" placeholder="100" min="20" max="5000">
                    <small id="sellPreview" style="color: #11998e; display: block; margin-top: 5px;"></small>
                </div>
                <div class="form-group">
                    <label>📱 M-Pesa number to receive cash</label>
                    <input type="tel" id="mpesaNumber" placeholder="0712345678">
                </div>
                <button onclick="sellAirtime()" id="sellBtn">Sell Airtime →</button>
            </div>

            <!-- BUY FORM -->
            <div id="buyForm" style="display:none">
                <div class="form-group">
                    <label>📞 Your phone number</label>
                    <input type="tel" id="buyPhone" placeholder="0712345678">
                </div>
                <div class="form-group">
                    <label>💵 Airtime amount to buy (KES)</label>
                    <input type="number" id="buyAmount" placeholder="100" min="20" max="5000">
                    <small id="buyPreview" style="color: #11998e; display: block; margin-top: 5px;"></small>
                </div>
                <div class="form-group">
                    <label>👤 Recipient phone number</label>
                    <input type="tel" id="recipientPhone" placeholder="Who gets the airtime?">
                </div>
                <button onclick="buyAirtime()" id="buyBtn">Buy Airtime →</button>
            </div>

            <div id="result" class="result"></div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="big">70%</div>
                <div>Sell Rate</div>
                <small>Send 100 KES → Get 70 KES</small>
            </div>
            <div class="info-card">
                <div class="big">85%</div>
                <div>Buy Rate</div>
                <small>Pay 85 KES → Get 100 KES</small>
            </div>
        </div>

        <div class="footer">
            <p>⚡ Instant Processing | 🔒 Secure | 💯 Trusted by 1000+ Users</p>
            <p style="margin-top: 5px;">📊 All transactions are securely recorded</p>
        </div>
    </div>

    <script>
        // Live preview for sell amount
        document.getElementById('sellAmount').addEventListener('input', function() {
            let amount = parseFloat(this.value);
            if (!isNaN(amount) && amount > 0) {
                let cash = amount * 0.70;
                document.getElementById('sellPreview').innerHTML = `💰 You'll receive: KES ${cash.toFixed(0)}`;
            } else {
                document.getElementById('sellPreview').innerHTML = '';
            }
        });

        // Live preview for buy amount
        document.getElementById('buyAmount').addEventListener('input', function() {
            let amount = parseFloat(this.value);
            if (!isNaN(amount) && amount > 0) {
                let pay = amount * 0.85;
                let save = amount - pay;
                document.getElementById('buyPreview').innerHTML = `💳 You'll pay: KES ${pay.toFixed(0)} (Save KES ${save.toFixed(0)})`;
            } else {
                document.getElementById('buyPreview').innerHTML = '';
            }
        });

        function showTab(tab) {
            document.getElementById('sellForm').style.display = tab === 'sell' ? 'block' : 'none';
            document.getElementById('buyForm').style.display = tab === 'buy' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('result').className = 'result';
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result ${type}`;
            setTimeout(() => {
                if (type !== 'loading') {
                    resultDiv.className = 'result';
                }
            }, 15000);
        }

        function setLoading(loading, buttonId) {
            const btn = document.getElementById(buttonId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
            } else {
                btn.disabled = false;
                btn.innerHTML = buttonId === 'sellBtn' ? 'Sell Airtime →' : 'Buy Airtime →';
            }
        }

        async function sellAirtime() {
            const phone = document.getElementById('sellPhone').value;
            const amount = document.getElementById('sellAmount').value;
            const mpesa = document.getElementById('mpesaNumber').value;

            if (!phone || !amount || !mpesa) {
                showResult('❌ Please fill in all fields', 'error');
                return;
            }

            if (parseFloat(amount) < 20) {
                showResult('❌ Minimum amount is 20 KES', 'error');
                return;
            }

            setLoading(true, 'sellBtn');
            showResult('<span class="loading-spinner"></span> Processing transaction...', 'loading');

            try {
                const response = await fetch('/api/sell', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, amount: parseFloat(amount), mpesaNumber: mpesa })
                });

                const data = await response.json();

                if (data.success) {
                    const cashPayout = parseFloat(amount) * 0.70;
                    const businessNumber = '0712345678';
                    
                    showResult(`
                        <strong>✅ Transaction #${data.transactionId} Initiated!</strong><br><br>
                        <strong>📋 Follow these steps:</strong><br>
                        1. Dial *334# (Safaricom) or *544# (Airtel)<br>
                        2. Select "Send Airtime"<br>
                        3. Enter business number: <strong>${businessNumber}</strong><br>
                        4. Enter amount: <strong>${amount} KES</strong><br>
                        5. Confirm transfer<br><br>
                        <strong>💰 You will receive: KES ${cashPayout.toFixed(0)}</strong><br>
                        <strong>📱 Sent to: ${mpesa}</strong><br><br>
                        <small>Transaction ID: ${data.transactionId} | After sending airtime, we'll process payment within 5 minutes.</small>
                    `, 'success');
                    
                    document.getElementById('sellPhone').value = '';
                    document.getElementById('sellAmount').value = '';
                    document.getElementById('mpesaNumber').value = '';
                    document.getElementById('sellPreview').innerHTML = '';
                } else {
                    showResult(`❌ Error: ${data.error || 'Transaction failed'}`, 'error');
                }
            } catch (error) {
                showResult('❌ Network error. Please try again.', 'error');
            } finally {
                setLoading(false, 'sellBtn');
            }
        }

        async function buyAirtime() {
            const phone = document.getElementById('buyPhone').value;
            const amount = document.getElementById('buyAmount').value;
            const recipient = document.getElementById('recipientPhone').value;

            if (!phone || !amount || !recipient) {
                showResult('❌ Please fill in all fields', 'error');
                return;
            }

            if (parseFloat(amount) < 20) {
                showResult('❌ Minimum amount is 20 KES', 'error');
                return;
            }

            setLoading(true, 'buyBtn');
            showResult('<span class="loading-spinner"></span> Generating payment request...', 'loading');

            try {
                const response = await fetch('/api/buy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, amount: parseFloat(amount), recipientPhone: recipient })
                });

                const data = await response.json();

                if (data.success) {
                    showResult(`
                        <strong>✅ Transaction #${data.transactionId}</strong><br><br>
                        <strong>💳 Send money via M-Pesa:</strong><br>
                        <strong>Paybill:</strong> ${data.paybill}<br>
                        <strong>Account:</strong> ${data.account}<br>
                        <strong>Amount:</strong> KES ${(parseFloat(amount) * 0.85).toFixed(0)}<br><br>
                        <strong>📱 Airtime will be sent to:</strong> ${recipient}<br>
                        <strong>🎉 You save:</strong> ${data.savings}<br><br>
                        <small>Transaction ID: ${data.transactionId} | After payment, airtime is delivered instantly.</small>
                    `, 'success');
                    
                    document.getElementById('buyPhone').value = '';
                    document.getElementById('buyAmount').value = '';
                    document.getElementById('recipientPhone').value = '';
                    document.getElementById('buyPreview').innerHTML = '';
                } else {
                    showResult(`❌ Error: ${data.error || 'Transaction failed'}`, 'error');
                }
            } catch (error) {
                showResult('❌ Network error. Please try again.', 'error');
            } finally {
                setLoading(false, 'buyBtn');
            }
        }
    </script>
</body>
</html>
